<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Global | World Operations</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- link to your private CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOP TICKER BAR -->
    <div class="broadcast-bar">
        <div class="ticker-track" id="ticker"></div>
    </div>

    <!-- NAVIGATION -->
    <nav>
        <img src="logo.png" alt="Skyline Global" class="nav-logo" onclick="showView('home')">
        <ul class="nav-links">
            <li onclick="showView('home')">OVERVIEW</li>
            <li onclick="showView('dashboard')">OPERATIONS</li>
            <li onclick="showView('login')" class="btn-portal">LOGIN</li>
        </ul>
    </nav>

    <!-- SECTION: HOME -->
    <div id="home" class="view active">
        <section class="hero">
            <div id="video-container"><div id="player"></div></div>
            <div class="overlay"></div>
            <div class="hero-content">
                <h1>SKYLINE GLOBAL</h1>
                <p class="sub-header">Strategic Financial Logistics</p>
                <div class="track-card">
                    <p>VERIFICATION PORTAL</p>
                    <div class="input-group">
                        <input type="text" id="trackSearch" placeholder="Enter Transit ID...">
                        <button onclick="showView('dashboard')">TRACK</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- SECTION: LOGIN -->
    <div id="login" class="view">
        <div class="auth-box">
            <h2>INSTITUTIONAL ACCESS</h2>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Access Key">
            <button onclick="showView('dashboard')">AUTHORIZE</button>
        </div>
    </div>

    <!-- SECTION: DASHBOARD -->
    <div id="dashboard" class="view">
        <div class="dash-container">
            <h2>OPERATIONS CONSOLE</h2>
            <div class="stat-grid">
                <div class="stat"><h3>ACTIVE</h3><p>04</p></div>
                <div class="stat"><h3>SETTLED</h3><p>1,284</p></div>
                <div class="stat"><h3>HEALTH</h3><p style="color:#0ea5e9">SECURE</p></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer id="footer">
        <img src="logo.png" height="50">
        <p>HQ: 123 Global Logistics Way, NYC</p>
        <p>Email: verify@skylineglobalfinclogistics.com</p>
    </footer>

    <!-- YouTube API and link to your private JS file -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
