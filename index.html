<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Global | Financial Logistics & Trade Finance</title>
    <!-- Professional Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS: THE "BIG LOOK" STYLING */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* HERO SECTION (FIRST SESSION) */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #bg-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 15, 35, 0.75); /* THE CORPORATE TINT */
            z-index: -1;
        }

        .content h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            /* THE GLOW EFFECT */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        .content h2 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: #ff8c00; /* LOGISTICS ORANGE */
            margin-bottom: 30px;
        }

        /* THE TRACKING BOX (LEGITIMACY) */
        .tracking-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .tracking-box input {
            padding: 15px;
            width: 300px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
        }

        .tracking-box button {
            padding: 15px 30px;
            background: #ff8c00;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .tracking-box button:hover { background: #e67e00; transform: scale(1.05); }

        /* TRUST BAR (THE "BIG COMPANY" MOVE) */
        .trust-bar {
            background: #fff;
            padding: 40px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            filter: grayscale(100%);
            opacity: 0.6;
        }
        .trust-bar p { color: #333; font-weight: bold; }

        /* NAVIGATION HEADER */
        header {
            position: absolute;
            top: 0; width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 3px; }

    </style>
</head>
<body>

    <header>
        <div class="logo">SKYLINE GLOBAL</div>
        <nav>
            <!-- Navigation items -->
        </nav>
    </header>

    <section class="hero">
        <!-- REPLACE THIS LINK with your YouTube link or Pexels file link -->
        <video autoplay muted loop id="bg-video">
            <source src="https://youtu.be/2KxCjRr-wlM
        </video>
        
        <div class="overlay"></div>

        <div class="content">
            <h1>SKYLINE</h1>
            <h2>GLOBAL FINANCIAL LOGISTICS</h2>
            <div class="tracking-box">
                <input type="text" id="trackID" placeholder="Enter Tracking Number...">
                <button onclick="track()">TRACK SHIPMENT</button>
            </div>
        </div>
    </section>

    <!-- TRUST BAR SECTION -->
    <div class="trust-bar">
        <p>PARTNER: MAERSK</p>
        <p>PARTNER: DHL GLOBAL</p>
        <p>PARTNER: FEDEX TRADE</p>
        <p>PARTNER: PORT OF DUBAI</p>
    </div>

    <script>
        function track() {
            var id = document.getElementById("trackID").value;
            if(id === "") {
                alert("Please enter a valid Shipment ID");
            } else {
                // REDIRECT TO FREE TRACKING SERVICE
                window.location.href = "https://www.aftership.com/track/" + id;
            }
        }
    </script>

</body>

</html>
