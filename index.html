<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Global | Financial Logistics & Trade Finance</title>
    
    <!-- Professional Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* CSS RESET & BASE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body, html { height: 100%; width: 100%; background-color: #000; color: #fff; overflow-x: hidden; }

        /* HERO SECTION CONTAINER */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* YOUTUBE BACKGROUND CONFIGURATION */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Prevents clicking on the video */
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* CORPORATE OVERLAY (Makes text readable) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 25, 0.7); /* Dark Navy Tint */
            z-index: 1;
        }

        /* NAVIGATION HEADER */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
        }

        .status-tag {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 5px 15px;
            text-transform: uppercase;
        }

        /* MAIN CONTENT SECTION */
        .content {
            position: relative;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 900px;
        }

        .content h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .content h2 {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            letter-spacing: 6px;
            color: #3b82f6; /* Global Blue */
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* MODERN TRACKING BOX (UI DESIGN) */
        .tracking-box {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: inline-block;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tracking-box p {
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #ccc;
        }

        .input-group {
            display: flex;
            width: 100%;
        }

        .tracking-box input {
            flex: 2;
            padding: 18px;
            border: none;
            border-radius: 5px 0 0 5px;
            outline: none;
            font-size: 1rem;
            background: #fff;
            color: #333;
        }

        .tracking-box button {
            flex: 1;
            padding: 18px;
            background-color: #ff8c00; /* Logistics Orange */
            color: white;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .tracking-box button:hover {
            background-color: #e67e00;
            transform: scale(1.02);
        }

        /* PARTNER TRUST BAR */
        .trust-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
        }

        .trust-bar span {
            color: #1a365d;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; }
            .input-group { flex-direction: column; }
            .tracking-box input { border-radius: 5px; margin-bottom: 10px; }
            .tracking-box button { border-radius: 5px; }
            .trust-bar { display: none; } /* Hide footer on small mobile to save space */
        }
    </style>
</head>
<body>

    <!-- SITE HEADER -->
    <header>
        <a href="#" class="logo">SKYLINE GLOBAL</a>
        <div class="status-tag">Network Status: Operational</div>
    </header>

    <!-- HERO SECTION WITH VIDEO -->
    <section class="hero">
        
        <!-- YOUTUBE VIDEO BACKGROUND -->
        <div class="video-background">
            <iframe 
                src="https://www.youtube.com/embed/2KxCjRr-wlM?autoplay=1&mute=1&loop=1&playlist=2KxCjRr-wlM&controls=0&rel=0&modestbranding=1&iv_load_policy=3" 
                frameborder="0" 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <div class="overlay"></div>
        
        <div class="content">
            <h1>SKYLINE GLOBAL</h1>
            <h2>Global Financial Logistics & Settlement</h2>
            
            <div class="tracking-box">
                <p>SECURE TRANSIT PORTAL</p>
                <div class="input-group">
                    <input type="text" id="manifestID" placeholder="Enter Manifest or Tracking ID">
                    <button onclick="checkStatus()">TRACK SHIPMENT</button>
                </div>
            </div>
        </div>
    </section>

    <!-- LOGISTICS PARTNERS FOOTER -->
    <div class="trust-bar">
        <span>PARTNER: MAERSK</span>
        <span>PARTNER: DHL GLOBAL</span>
        <span>PARTNER: FEDEX TRADE</span>
        <span>PARTNER: PORT OF DUBAI</span>
        <span>PARTNER: SINGAPORE TRANSIT</span>
    </div>

    <!-- LOGIC FOR TRACKING -->
    <script>
        function checkStatus() {
            const val = document.getElementById('manifestID').value;
            if (val === "") {
                alert("Please enter a valid Skyline Global Tracking ID.");
            } else {
                alert("Connecting to Skyline Secure Servers... Fetching Manifest: " + val);
                // Future implementation: 
                // window.location.href = "https://skylineglobalfinclogistics.com/status/" + val;
            }
        }
    </script>

</body>
</html>
